<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Miropolis — Séance simulée</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* Palette groupes validée (dark, CVD ok avec encodage secondaire :
     blocs spatiaux contigus + légende + labels au survol). */
  :root{
    --bg:#14161f; --panel:rgba(24,27,38,.94); --ink:#E6E9F0; --ink2:#9aa3b5; --line:#2a2f3f;
  }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:14px/1.45 "Segoe UI",system-ui,sans-serif;overflow:hidden}
  #scene{position:fixed;inset:0}
  .hud{position:fixed;z-index:10}
  /* l'AMENDEMENT DISCUTÉ au-dessus, en travers de l'écran */
  #titlebar{top:0;left:0;right:240px;padding:10px 20px 14px;
    background:linear-gradient(#14161fF8,#14161f00)}
  #titlebar .k{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--ink2)}
  #titlebar h1{margin:2px 0 0;font-size:15.5px;font-weight:600;letter-spacing:.2px;line-height:1.3;
    max-height:2.6em;overflow:hidden}
  #titlebar .sub{color:var(--ink2);font-size:11.5px;margin-top:3px}
  /* fil du débat : PLEINE HAUTEUR à gauche — l'assemblée occupe la droite */
  #feed{left:16px;top:84px;bottom:64px;width:430px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:12px 0 12px 14px;
    display:flex;flex-direction:column}
  #feed h2{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2)}
  #feed .scroll{overflow-y:auto;flex:1;padding-right:10px}
  .msg{margin:0 0 10px;padding:9px 11px;background:#20242f;border-radius:10px;font-size:13.5px;line-height:1.5}
  .msg .who{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:6px}
  .msg .chip{display:inline-block;width:9px;height:9px;border-radius:3px;flex:none}
  .msg .grp{color:var(--ink2);font-size:11px;font-weight:400}
  .msg .txt{margin-top:4px;color:#cdd3e0}
  .msg.interj{background:#2b2027;font-style:italic}
  .msg.pres{background:#242a3d}
  .msg.pres .txt{color:var(--ink2)}
  #tally{top:10px;right:16px;width:205px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:9px 12px}
  #tally h2{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2)}
  .trow{margin:7px 0}
  .trow .lab{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2)}
  .trow .lab b{color:var(--ink);font-weight:600}
  .bar{height:7px;border-radius:4px;background:#232736;margin-top:3px;position:relative;overflow:visible}
  .bar .fill{height:100%;border-radius:4px;background:#aeb9d6;transition:width .4s}
  .bar .real{position:absolute;top:-3px;width:2px;height:13px;background:#fff;border-radius:1px}
  #tally .foot{margin-top:10px;font-size:11px;color:var(--ink2);border-top:1px solid var(--line);padding-top:8px}
  #verdict{margin-top:8px;font-size:12.5px;display:none}
  #legend{right:16px;bottom:64px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:9px 11px;max-width:230px}
  #legend .g{display:inline-flex;align-items:center;gap:5px;margin:2px 7px 2px 0;font-size:11px;color:var(--ink2)}
  #legend .chip{width:9px;height:9px;border-radius:3px;display:inline-block}
  #controls{left:calc(50% + 215px);transform:translateX(-50%);bottom:16px;display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:8px 14px}
  #controls button{background:#262b3c;color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:5px 12px;font-size:13px;cursor:pointer}
  #controls button:hover{background:#303650}
  #prog{width:190px;accent-color:#aeb9d6}
  #tip{position:fixed;z-index:20;background:#0f1118F2;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;font-size:12px;pointer-events:none;display:none;max-width:240px}
  /* verdict plein écran après le vote */
  #overlay{left:calc(50% + 215px);top:44%;transform:translate(-50%,-50%);text-align:center;display:none;
    background:rgba(15,17,24,.92);border:1px solid var(--line);border-radius:18px;padding:26px 44px}
  #overlay .big{font-size:34px;font-weight:700;letter-spacing:.5px}
  #overlay .big.ok{color:#57d18b} #overlay .big.ko{color:#e06a6a}
  #overlay .cmp{margin-top:10px;font-size:15px;color:var(--ink2)}
  #overlay .cmp b{color:var(--ink)}
  #overlay .nums{margin-top:12px;font-size:13px;color:var(--ink2);display:flex;gap:22px;justify-content:center}
  #overlay .nums .v{color:var(--ink);font-weight:600;font-size:16px}
  #overlay .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
  #tip .n{font-weight:600}
  #tip .d{color:var(--ink2)}
  #drop{bottom:16px;right:16px;font-size:11.5px;color:var(--ink2)}
  #drop input{display:none}
  #drop label{cursor:pointer;text-decoration:underline dotted}
  /* résumé de clôture (présidente de séance) : modale — laisse de l'espace
     autour, ne couvre jamais tout l'écran ; clic à l'extérieur pour fermer */
  #recap-backdrop{position:fixed;inset:0;background:rgba(10,11,18,.55);display:none;z-index:15}
  #recap{position:fixed;z-index:16;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(78vw,560px);max-height:72vh;overflow-y:auto;display:none;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:22px 26px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
  #recap .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink2)}
  #recap .who{margin-top:4px;font-size:15px;font-weight:600}
  #recap .txt{margin-top:12px;font-size:14.5px;line-height:1.65;color:#dfe3ec}
  #recap .hint{margin-top:16px;font-size:11px;color:var(--ink2);text-align:center}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="hud" id="titlebar"><div class="k">Texte en débat</div>
  <h1 id="t-titre">Miropolis</h1>
  <div class="sub" id="t-sub">simulation projective de séance — Assemblée nationale</div></div>

<div class="hud" id="drop"><label>charger un autre run (runs/*.json)<input type="file" id="file" accept=".json"></label></div>

<div class="hud" id="tally">
  <h2>Scrutin — tally</h2>
  <div id="rows"></div>
  <div class="foot">barre = prédit (évolue avec le débat) · le réel est révélé au vote<br>
    <span id="deplace"></span></div>
  <div id="verdict"></div>
</div>

<div class="hud" id="feed"><h2>Débat en séance</h2><div class="scroll" id="feed-scroll"></div></div>

<div class="hud" id="legend"></div>
<div class="hud" id="overlay"></div>

<div id="recap-backdrop"></div>
<div class="hud" id="recap">
  <div class="k">Résumé de clôture</div>
  <div class="who">Yaël Braun-Pivet, présidente de séance</div>
  <div class="txt" id="recap-txt"></div>
  <div class="hint">cliquer à l'extérieur pour fermer et passer au vote</div>
</div>

<div class="hud" id="controls">
  <button id="b-prev">⏮</button>
  <button id="b-play">▶ Lancer la séance</button>
  <button id="b-next">⏭</button>
  <input type="range" id="prog" min="0" max="1" value="0" step="1">
  <button id="b-speed">×1</button>
</div>

<div id="tip"></div>

<script type="application/json" id="run-data">/*__RUN_DATA__*/null</script>

<script type="importmap">{"imports":{"three":"./lib/three.module.min.js"}}</script>
<script type="module">
import * as THREE from 'three';

/* ---------- données ---------- */
// build_demo.py embarque toujours un TABLEAU de runs (1 ou plusieurs) : on
// en tire un au hasard à chaque chargement, pour ne pas montrer toujours
// le même scrutin. "charger un autre run" (plus bas) reste possible en plus.
const embedded = JSON.parse(document.getElementById('run-data').textContent.replace('/*__RUN_DATA__*/',''));
const RUNS = Array.isArray(embedded) ? embedded : [embedded];
let RUN = RUNS[Math.floor(Math.random()*RUNS.length)];

const GROUP_ORDER = ["LFI-NFP","GDR","EcoS","SOC","LIOT","Dem","EPR","HOR","DR","UDR","RN","NI"];
const GROUP_COLOR = {
  "LFI-NFP":"#E5446D","GDR":"#C43131","EcoS":"#2FA45C","SOC":"#CC6E8C",
  "LIOT":"#9C79CC","Dem":"#CC7226","EPR":"#C29B1F","HOR":"#2BA3B5",
  "DR":"#4A72DE","UDR":"#B57A33","RN":"#3D5FCC","NI":"#8E9AB3"};

/* ---------- scène ---------- */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:false,
  powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.25)); // perf (GPU intégrés)
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14161f);
scene.fog = new THREE.Fog(0x14161f, 70, 150);
const cam = new THREE.PerspectiveCamera(48, 1, .1, 400);

/* caméra côté perchoir : on regarde l'hémicycle DE FACE (vue de la présidence),
   avec du recul — l'amphithéâtre monte en hauteur.
   azTarget = cap visé ; az s'en approche à CHAQUE frame → mouvements fluides. */
let az=Math.PI, azTarget=Math.PI, el=.34, dist=52, target=new THREE.Vector3(0,2.6,11);
function placeCam(){
  cam.position.set(target.x+dist*Math.cos(el)*Math.sin(az),
                   target.y+dist*Math.sin(el),
                   target.z+dist*Math.cos(el)*Math.cos(az));
  cam.lookAt(target);
}
let drag=null;
const mouse=new THREE.Vector2(-2,-2);
canvas.addEventListener('pointerdown',e=>{drag={x:e.clientX,y:e.clientY};});
addEventListener('pointerup',()=>drag=null);
addEventListener('pointermove',e=>{
  if(drag){az-=(e.clientX-drag.x)*.005; azTarget=az;
    el=Math.min(1.35,Math.max(.12,el+(e.clientY-drag.y)*.004));
    drag={x:e.clientX,y:e.clientY}; placeCam();}
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
});
canvas.addEventListener('wheel',e=>{dist=Math.min(90,Math.max(15,dist+e.deltaY*.02)); placeCam();},{passive:true});

scene.add(new THREE.HemisphereLight(0x8899cc, 0x11131c, 1.05));
const key = new THREE.DirectionalLight(0xffffff, 1.4); key.position.set(-14,26,30); scene.add(key);
const spot = new THREE.SpotLight(0xfff2d0, 0, 60, .3, .5, 1.1); spot.visible=false;
scene.add(spot); scene.add(spot.target);

/* sol + perchoir (dans notre dos) + gradins */
const floor = new THREE.Mesh(new THREE.CircleGeometry(44, 64),
  new THREE.MeshLambertMaterial({color:0x1b1e2b}));
floor.rotation.x=-Math.PI/2; floor.position.z=8; scene.add(floor);
const dais = new THREE.Mesh(new THREE.BoxGeometry(8,1.1,2.6),
  new THREE.MeshLambertMaterial({color:0x272c3e}));
dais.position.set(0,.55,-2.2); scene.add(dais);
/* la présidente de séance, au perchoir */
const presidente=new THREE.Group();
const pTorso=new THREE.Mesh(new THREE.BoxGeometry(.5,.95,.34),
  new THREE.MeshStandardMaterial({color:0xbfc6da, emissive:0xbfc6da, emissiveIntensity:.05, roughness:.5}));
pTorso.position.y=.48; presidente.add(pTorso);
const pHead=new THREE.Mesh(new THREE.SphereGeometry(.17,10,8),
  new THREE.MeshLambertMaterial({color:0xe8d6c0}));
pHead.position.y=1.13; presidente.add(pHead);
presidente.position.set(0,1.1,-2.2); presidente.rotation.y=0; scene.add(presidente);

/* ---------- hémicycle : bonhommes instanciés ---------- */
const ROWS=8, R0=10, DR=2.3, A0=Math.PI-0.18, A1=0.18;
let seatData=[];               // {d, x,y,z, rotY}
let torsoIM=null, headIM=null; // InstancedMesh (2 draw calls pour tous)
let standing=null, standingHead=null, lastIdx=-1, standT0=0;
const arcsGroup=new THREE.Group(); scene.add(arcsGroup);
const rowsGroup=new THREE.Group(); scene.add(rowsGroup);
const bodiesGroup=new THREE.Group(); scene.add(bodiesGroup);
const raycaster=new THREE.Raycaster();
const M=new THREE.Matrix4(), Q=new THREE.Quaternion(), S=new THREE.Vector3(1,1,1),
      P=new THREE.Vector3(), EULER=new THREE.Euler();

function buildHemicycle(run){
  bodiesGroup.clear(); rowsGroup.clear(); seatData=[]; lastIdx=-1;
  const deps=[...run.deputes].sort((a,b)=>
    GROUP_ORDER.indexOf(a.groupe)-GROUP_ORDER.indexOf(b.groupe) || (a.nom<b.nom?-1:1));
  const N=deps.length;
  // slots (rangée, angle) triés par angle → secteurs politiques
  const caps=[]; let tot=0;
  for(let r=0;r<ROWS;r++){caps[r]=R0+r*DR; tot+=caps[r];}
  const slots=[]; let rem=N;
  for(let r=0;r<ROWS;r++){
    const cap=r===ROWS-1?rem:Math.max(1,Math.round(N*caps[r]/tot)); rem-=cap;
    for(let i=0;i<cap;i++){const f=cap===1?.5:i/(cap-1); slots.push({r, ang:A1+(A0-A1)*f});}
  }
  slots.sort((a,b)=>a.ang-b.ang || a.r-b.r);
  // gradins en AMPHITHÉÂTRE : plateau + contremarche par rangée
  const STEP=.62;
  for(let r=0;r<ROWS;r++){
    const y=.02+r*STEP;
    const ring=new THREE.Mesh(
      new THREE.RingGeometry(R0+r*DR-1.05, R0+r*DR+1.05, 48, 1, A1, A0-A1),
      new THREE.MeshLambertMaterial({color:0x20242f}));
    ring.rotation.x=-Math.PI/2; ring.position.y=y; rowsGroup.add(ring);
    if(r>0){
      const riser=new THREE.Mesh(
        new THREE.CylinderGeometry(R0+r*DR-1.05, R0+r*DR-1.05, STEP, 48, 1, true, A1-Math.PI/2, A0-A1),
        new THREE.MeshLambertMaterial({color:0x1a1d28, side:THREE.DoubleSide}));
      riser.position.y=y-STEP/2; rowsGroup.add(riser);
    }
  }
  // instanced : torse assis + tête
  const torsoGeo=new THREE.BoxGeometry(.5,.55,.34);
  const headGeo=new THREE.SphereGeometry(.17,10,8);
  torsoIM=new THREE.InstancedMesh(torsoGeo,new THREE.MeshLambertMaterial(),N);
  headIM=new THREE.InstancedMesh(headGeo,new THREE.MeshLambertMaterial(),N);
  const c=new THREE.Color();
  slots.slice(0,N).forEach((s,k)=>{
    const d=deps[k];
    const radius=R0+s.r*DR, y=.02+s.r*.62;
    const x=Math.cos(s.ang)*radius, z=0.5+Math.sin(s.ang)*radius;
    const rotY=Math.atan2(x-0, z-(-2)); // face au perchoir
    seatData.push({d, x, y, z, rotY});
    Q.setFromEuler(EULER.set(0,rotY,0));
    M.compose(P.set(x,y+.42,z),Q,S); torsoIM.setMatrixAt(k,M);
    M.compose(P.set(x,y+.86,z),Q,S); headIM.setMatrixAt(k,M);
    c.set(GROUP_COLOR[d.groupe]||'#666');
    torsoIM.setColorAt(k,c);
    headIM.setColorAt(k,c.clone().lerp(new THREE.Color('#e8d6c0'),.55));
  });
  torsoIM.instanceMatrix.needsUpdate=true; headIM.instanceMatrix.needsUpdate=true;
  if(torsoIM.instanceColor) torsoIM.instanceColor.needsUpdate=true;
  if(headIM.instanceColor) headIM.instanceColor.needsUpdate=true;
  bodiesGroup.add(torsoIM); bodiesGroup.add(headIM);
  // bonhomme debout (réutilisé pour chaque orateur)
  standing=new THREE.Group();
  const st=new THREE.Mesh(new THREE.BoxGeometry(.5,.95,.34),
    new THREE.MeshStandardMaterial({roughness:.5, emissiveIntensity:.7}));
  st.position.y=.48; standing.add(st);
  standingHead=new THREE.Mesh(headGeo,new THREE.MeshLambertMaterial());
  standingHead.position.y=1.13; standing.add(standingHead);
  standing.visible=false; scene.add(standing);
}

function setSeatVisible(k,on){
  const s=seatData[k];
  Q.setFromEuler(EULER.set(0,s.rotY,0));
  const sc=on?S:new THREE.Vector3(1e-4,1e-4,1e-4);
  M.compose(P.set(s.x,s.y+.42,s.z),Q,sc); torsoIM.setMatrixAt(k,M);
  M.compose(P.set(s.x,s.y+.86,s.z),Q,sc); headIM.setMatrixAt(k,M);
  torsoIM.instanceMatrix.needsUpdate=true; headIM.instanceMatrix.needsUpdate=true;
}

function groupCentroid(g){
  const v=new THREE.Vector3(); let n=0;
  seatData.forEach(s=>{if(s.d.groupe===g){v.x+=s.x;v.y+=s.y;v.z+=s.z;n++;}});
  if(n)v.divideScalar(n); return {v,n};
}

/* ---------- arcs d'influence (géométries libérées à chaque clear → pas de fuite) ---------- */
function clearArcs(){
  arcsGroup.children.forEach(m=>{m.geometry.dispose(); m.material.dispose();});
  arcsGroup.clear();
}
function influenceArcs(seat, run){
  clearArcs();
  const aff=run.affinites?.[seat.d.groupe]||{};
  for(const g of GROUP_ORDER){
    if(g===seat.d.groupe || !(g in aff)) continue;
    const w=aff[g]; if(Math.abs(w)<0.05) continue;
    const {v:to,n}=groupCentroid(g); if(!n) continue;
    const from=new THREE.Vector3(seat.x,seat.y+1.2,seat.z);
    const mid=from.clone().add(to).multiplyScalar(.5); mid.y+=4+6*Math.abs(w);
    const curve=new THREE.QuadraticBezierCurve3(from, mid, to.clone().setY(to.y+.8));
    const geo=new THREE.TubeGeometry(curve, 20, .05+.10*Math.abs(w), 5, false);
    const mat=new THREE.MeshBasicMaterial({
      color:w>0?0x57d18b:0xe06a6a, transparent:true, opacity:0});
    mat.userData.target=.12+.5*Math.abs(w);   // fondu d'apparition dans loop()
    arcsGroup.add(new THREE.Mesh(geo,mat));
  }
}

/* ---------- HUD ---------- */
const $=id=>document.getElementById(id);
function legend(run){
  const present=new Set(run.deputes.map(d=>d.groupe));
  $('legend').innerHTML=GROUP_ORDER.filter(g=>present.has(g)).map(g=>
    `<span class="g"><span class="chip" style="background:${GROUP_COLOR[g]}"></span>${g}</span>`).join('')
    +'<div style="margin-top:5px;font-size:10.5px;color:var(--ink2)">arcs : '
    +'<span style="color:#57d18b">vert = attire</span> · '
    +'<span style="color:#e06a6a">rouge = repousse</span> (affinités mesurées)</div>';
}
function tallyRows(run, current, reveal){
  // le réel (chiffre + trait blanc) reste caché tant que le vote n'a pas eu
  // lieu — sinon la "prédiction" affichée pendant tout le débat n'en est
  // plus une, on voit juste la réponse à côté du curseur qui bouge un peu.
  // texte fictif : pas de résultat réel → on échelonne sur le total des
  // députés et on n'affiche jamais de comparaison "réel".
  const hasReel=!!run.reel;
  const max=hasReel ? Math.max(run.reel.pour+run.reel.contre+run.reel.abstention, 1)
                    : Math.max(run.deputes.length, 1);
  $('rows').innerHTML=['pour','contre','abstention'].map(p=>{
    const v=current[p]??run.tally_avant_debat[p], r=hasReel?run.reel[p]:0;
    const reel=(reveal&&hasReel)?` <span style="color:var(--ink2)">/ ${r} réel</span>`:'';
    const trait=(reveal&&hasReel)?`<div class="real" style="left:${100*r/max}%"></div>`:'';
    return `<div class="trow"><div class="lab"><span>${p}</span><b>${v.toFixed(0)}${reel}</b></div>
      <div class="bar"><div class="fill" style="width:${100*v/max}%"></div>${trait}</div></div>`;}).join('');
}

/* ---------- replay ---------- */
let events=[], idx=-1, playing=false, speed=1;
const PRESIDENTE="Yaël Braun-Pivet";
function buildEvents(run){
  // la présidente de séance donne la parole avant chaque orateur (pas avant
  // les interjections, qui fusent) — comme dans le vrai compte rendu
  const out=[{presidence:true, nom:PRESIDENTE,
              texte:"La séance est ouverte. L'ordre du jour appelle la discussion sur : "
                    +(run.scrutin?.titre||"")+"."}];
  for(const ev of run.transcript){
    if(!ev.interjection){
      const civ=/^(Mme|Marie|Anne|Nathalie|Sophie|Clémence|Mathilde|Eva|Cyrielle|Sandrine|Danielle|Elsa|Ségolène|Christine|Émilie|Julie|Laure|Sabrina|Karen|Alma|Andrée|Béatrice|Blandine)/.test(ev.nom)?"Mme":"M.";
      out.push({presidence:true, nom:PRESIDENTE,
                texte:`La parole est à ${civ} ${ev.nom}, pour le groupe ${ev.groupe}.`});
    }
    out.push(ev);
  }
  out.push({presidence:true, nom:PRESIDENTE,
            texte:"La discussion est close. Je mets aux voix."});
  return out;
}
function prepare(run){
  events=buildEvents(run);
  $('feed-scroll').innerHTML='';
  $('prog').max=Math.max(events.length-1,1);
  const titre=(run.scrutin?.titre||'');
  $('t-titre').textContent=titre.charAt(0).toUpperCase()+titre.slice(1);
  $('t-sub').textContent=`Miropolis · scrutin ${run.scrutin?.uid||''} · ${run.deputes.length} députés · `
    +`${events.length} prises de parole · thème ${run.scrutin?.theme||'?'} · `
    +(run.reel?'sort réel révélé au vote':'texte fictif — prédiction pure');
  $('deplace').textContent=`voix déplacées par la séance : ${run.voix_deplacees_par_le_debat??'—'}`;
  legend(run); tallyRows(run, run.tally_avant_debat);
  buildHemicycle(run); placeCam();
}
function opinionAt(frac){
  const t={pour:0,contre:0,abstention:0};
  RUN.deputes.forEach(d=>{for(const p in t){t[p]+=d.opinion0[p]+(d.opinion[p]-d.opinion0[p])*frac;}});
  // léger frémissement pendant le débat (une séance réelle n'a jamais un
  // compteur parfaitement figé) : une bosse nulle en frac=0 et frac=1, donc
  // le début et le verdict final restent exacts, seul le milieu du débat
  // vacille un peu. Amplitude volontairement faible et déterministe (pas de
  // Math.random ici) pour ne pas clignoter n'importe comment à chaque frame.
  const n=RUN.deputes.length, bump=Math.sin(frac*Math.PI)*Math.max(2,n*0.01);
  const dPour=bump*Math.sin(frac*11+n*0.7), dContre=bump*Math.sin(frac*13+n*1.3+1);
  t.pour+=dPour; t.contre+=dContre; t.abstention-=dPour+dContre; // somme conservée
  return t;
}
let typer=null;
function feedMsg(ev){
  const div=document.createElement('div');
  div.className='msg'+(ev.interjection?' interj':'')+(ev.presidence?' pres':'');
  const chip=ev.presidence?'#bfc6da':(GROUP_COLOR[ev.groupe]||'#666');
  const grp=ev.presidence?'présidente de séance':ev.groupe+(ev.interjection?' — interjection':'');
  div.innerHTML=`<div class="who"><span class="chip" style="background:${chip}"></span>
    ${ev.interjection?'💥 ':''}${ev.nom} <span class="grp">${grp}</span></div><div class="txt"></div>`;
  $('feed-scroll').appendChild(div);
  // le texte DÉROULE (machine à écrire), le fil auto-scrolle
  const txt=div.querySelector('.txt'); let c=0;
  if(typer) clearInterval(typer);
  typer=setInterval(()=>{
    c=Math.min(ev.texte.length, c+3);
    txt.textContent=ev.texte.slice(0,c);
    $('feed-scroll').scrollTop=$('feed-scroll').scrollHeight;
    if(c>=ev.texte.length) clearInterval(typer);
  }, 16/Math.min(speed,2));
}
function showEvent(i){
  idx=i; $('prog').value=i;
  const ev=events[i]; if(!ev) return;
  if(ev.presidence){
    // la présidente parle : orateur rassis, focus perchoir
    if(lastIdx>=0){setSeatVisible(lastIdx,true); lastIdx=-1;}
    standing.visible=false; clearArcs();
    pTorso.material.emissiveIntensity=.5;
    spot.visible=true; spot.position.set(0,14,2);
    spot.target.position.set(0,1.5,-2.2); spot.intensity=250;
    azTarget=Math.PI;
  } else {
    pTorso.material.emissiveIntensity=.05;
    const k=seatData.findIndex(s=>s.d.nom===ev.nom);
    if(lastIdx>=0) setSeatVisible(lastIdx,true);
    if(k>=0){
      const s=seatData[k];
      setSeatVisible(k,false);            // il quitte son siège…
      standing.visible=true;               // …et se lève
      standing.position.set(s.x,s.y,s.z);
      standing.rotation.y=s.rotY;
      const col=new THREE.Color(GROUP_COLOR[s.d.groupe]||'#666');
      standing.children[0].material.color.copy(col);
      standing.children[0].material.emissive.copy(col);
      standingHead.material.color.copy(col.clone().lerp(new THREE.Color('#e8d6c0'),.55));
      spot.visible=true; spot.position.set(s.x,15,s.z+3);
      spot.target.position.set(s.x,1,s.z); spot.intensity=300;
      influenceArcs(s, RUN);
      const lean=Math.max(-.35,Math.min(.35,Math.atan2(s.x,26)));
      azTarget=Math.PI-lean;
      standT0=performance.now();          // anime le lever
      lastIdx=k;
    }
  }
  feedMsg(ev);
  tallyRows(RUN, opinionAt((i+1)/events.length));
  if(i>=events.length-1) finish();
}
/* ---------- séquence de vote finale ----------
   Pendant le vote, l'encodage bascule : la couleur du siège = son VOTE
   (statut pour/contre/abstention), plus le groupe. L'overlay l'annonce. */
const VOTE_COLOR={pour:0x3fbf7f, contre:0xd95c5c, abstention:0x8a8f9c};
let voteAnim=null;
function resetColors(){
  if(!torsoIM) return;
  const c=new THREE.Color();
  seatData.forEach((s,k)=>{
    c.set(GROUP_COLOR[s.d.groupe]||'#666');
    torsoIM.setColorAt(k,c);
    headIM.setColorAt(k,c.clone().lerp(new THREE.Color('#e8d6c0'),.55));
  });
  torsoIM.instanceColor.needsUpdate=true; headIM.instanceColor.needsUpdate=true;
}
function voteSequence(){
  // vague de gauche à droite : chaque député prend la couleur de son vote
  const order=[...seatData.keys()].sort((a,b)=>seatData[a].x-seatData[b].x);
  let ptr=0; const c=new THREE.Color();
  if(voteAnim) clearInterval(voteAnim);
  voteAnim=setInterval(()=>{
    for(let n=0;n<10 && ptr<order.length;n++,ptr++){
      const k=order[ptr], d=seatData[k].d;
      const pos=['pour','contre','abstention'].reduce((a,b)=>d.opinion[a]>=d.opinion[b]?a:b);
      c.set(VOTE_COLOR[pos]); torsoIM.setColorAt(k,c); headIM.setColorAt(k,c);
    }
    torsoIM.instanceColor.needsUpdate=true; headIM.instanceColor.needsUpdate=true;
    if(ptr>=order.length){clearInterval(voteAnim); voteAnim=null; verdictOverlay();}
  },40);
}
function verdictOverlay(){
  const pred=RUN.tally.pour>RUN.tally.contre?'ADOPTÉ':'REJETÉ';
  const hasReel=!!RUN.reel;
  const reel=(RUN.scrutin?.sort||'?').toUpperCase();
  const ok=(pred==='ADOPTÉ')===reel.includes('ADOPT');
  const o=$('overlay'); o.style.display='block';
  // texte fictif : on n'a aucune issue réelle à comparer → prédiction seule,
  // pas de ✅/❌, pas de colonne "réel".
  const num=(lab,col,v)=>`<span><span class="dot" style="background:${col}"></span>${lab} `
    +`<span class="v">${v.toFixed(0)}</span></span>`;
  const numCmp=(lab,col,v,r)=>`<span><span class="dot" style="background:${col}"></span>${lab} `
    +`<span class="v">${v.toFixed(0)}</span> <span style="font-size:11px">/ ${r} réel</span></span>`;
  o.innerHTML=`<div class="big ${hasReel?(ok?'ok':'ko'):''}">${pred}${hasReel?(ok?' ✅':' ❌'):''}</div>
    <div class="cmp">${hasReel?`prédit par la simulation · sort réel : <b>${reel}</b>`
                              :`prédiction Miropolis · <b>texte fictif, aucune issue réelle</b>`}</div>
    <div class="nums">
      ${hasReel?numCmp('pour','#3fbf7f',RUN.tally.pour,RUN.reel.pour):num('pour','#3fbf7f',RUN.tally.pour)}
      ${hasReel?numCmp('contre','#d95c5c',RUN.tally.contre,RUN.reel.contre):num('contre','#d95c5c',RUN.tally.contre)}
      ${hasReel?numCmp('abst.','#8a8f9c',RUN.tally.abstention,RUN.reel.abstention):num('abst.','#8a8f9c',RUN.tally.abstention)}
    </div>`;
}
function showRecap(text, onClose){
  $('recap-txt').textContent=text;
  $('recap').style.display='block';
  $('recap-backdrop').style.display='block';
  const close=()=>{
    $('recap').style.display='none'; $('recap-backdrop').style.display='none';
    $('recap-backdrop').removeEventListener('click', close);
    onClose();
  };
  $('recap-backdrop').addEventListener('click', close);
}
function finish(){
  playing=false; $('b-play').textContent='↺ Rejouer';
  if(lastIdx>=0){setSeatVisible(lastIdx,true); lastIdx=-1;}
  standing.visible=false; spot.visible=false; clearArcs();
  pTorso.material.emissiveIntensity=.05;
  tallyRows(RUN, RUN.tally, true);
  const v=$('verdict'); v.style.display='block';
  const pred=RUN.tally.pour>RUN.tally.contre?'adopté':'rejeté';
  if(RUN.reel){
    const ok=(pred==='adopté')===((RUN.scrutin?.sort||'').includes('adopt'));
    v.innerHTML=`Sort prédit : <b>${pred}</b> · réel : <b>${RUN.scrutin?.sort}</b> ${ok?'✅':'❌'}`;
  } else {
    v.innerHTML=`Sort prédit : <b>${pred}</b> · <span style="color:var(--ink2)">texte fictif</span>`;
  }
  // le résumé de clôture (s'il existe) s'affiche AVANT le vote ; on ne lance
  // la séquence de vote qu'une fois la modale fermée (clic à l'extérieur)
  if(RUN.recap_president) showRecap(RUN.recap_president, voteSequence);
  else voteSequence();
}
function tick(){
  if(playing){
    if(idx<events.length-1) showEvent(idx+1); else {playing=false; return;}
    const ev=events[idx];
    const delay=(ev?.presidence?2300:ev?.interjection?1600:4200)/speed;
    if(playing) setTimeout(tick, delay);
  }
}
function rebuildFeed(upto){
  if(typer) clearInterval(typer);
  $('feed-scroll').innerHTML='';
  for(let j=0;j<=upto;j++){
    const ev=events[j]; if(!ev) continue;
    const div=document.createElement('div');
    div.className='msg'+(ev.interjection?' interj':'')+(ev.presidence?' pres':'');
    const chip=ev.presidence?'#bfc6da':(GROUP_COLOR[ev.groupe]||'#666');
    const grp=ev.presidence?'présidente de séance':ev.groupe+(ev.interjection?' — interjection':'');
    div.innerHTML=`<div class="who"><span class="chip" style="background:${chip}"></span>
      ${ev.interjection?'💥 ':''}${ev.nom} <span class="grp">${grp}</span></div>
      <div class="txt">${ev.texte}</div>`;
    $('feed-scroll').appendChild(div);
  }
  $('feed-scroll').scrollTop=$('feed-scroll').scrollHeight;
}
$('b-play').onclick=()=>{
  if(idx>=events.length-1){idx=-1;$('verdict').style.display='none';
    $('feed-scroll').innerHTML=''; $('overlay').style.display='none'; resetColors();
    $('recap').style.display='none'; $('recap-backdrop').style.display='none';
    tallyRows(RUN, RUN.tally_avant_debat);}
  playing=!playing; $('b-play').textContent=playing?'⏸ Pause':'▶ Lancer la séance';
  if(playing) tick();
};
$('b-next').onclick=()=>{playing=false;showEvent(Math.min(idx+1,events.length-1));};
$('b-prev').onclick=()=>{playing=false;rebuildFeed(Math.max(idx-1,0)-1);showEvent(Math.max(idx-1,0));};
$('prog').oninput=e=>{playing=false;rebuildFeed(+e.target.value-1);showEvent(+e.target.value);};
$('b-speed').onclick=e=>{speed=speed>=4?1:speed*2;e.target.textContent='×'+speed;};
$('file').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{RUN=JSON.parse(r.result); idx=-1; prepare(RUN);};
  r.readAsText(f);
};

/* tooltip 3D — raycast throttlé (perf) */
const tip=$('tip'); let frame=0;
function hover(){
  if(!torsoIM) return;
  raycaster.setFromCamera(mouse,cam);
  const hit=raycaster.intersectObject(torsoIM)[0];
  if(hit && hit.instanceId!=null && seatData[hit.instanceId]){
    const d=seatData[hit.instanceId].d;
    tip.style.display='block';
    tip.style.left=(innerWidth*(mouse.x+1)/2+14)+'px';
    tip.style.top=(innerHeight*(1-(mouse.y+1)/2)+10)+'px';
    tip.innerHTML=`<div class="n">${d.nom}</div><div class="d">${d.groupe} · loyauté ${(d.loyaute*100).toFixed(0)}%<br>
      P(pour) ${(d.opinion0.pour*100).toFixed(0)}% → ${(d.opinion.pour*100).toFixed(0)}%</div>`;
  } else tip.style.display='none';
}

/* boucle */
function resize(){
  renderer.setSize(innerWidth,innerHeight);
  cam.aspect=innerWidth/innerHeight;
  // le fil occupe ~460px à gauche → on décale la scène 3D vers la DROITE
  cam.setViewOffset(innerWidth,innerHeight,-230,0,innerWidth,innerHeight);
  cam.updateProjectionMatrix();
}
addEventListener('resize',resize); resize();
function loop(t){
  requestAnimationFrame(loop);
  if(standing.visible){
    standing.children[0].material.emissiveIntensity=.45+.3*Math.sin(t*.006);
    // lever animé : il se déplie en ~350 ms, puis balancement léger
    const k=Math.min(1,(performance.now()-standT0)/350), e=1-(1-k)*(1-k);
    standing.scale.set(1,.35+.65*e,1);
    standing.position.y=(seatData[lastIdx]?.y??0)+.06*e*Math.max(0,Math.sin(t*.004));
  }
  // fondu d'apparition des arcs d'influence
  arcsGroup.children.forEach(a=>{a.material.opacity+=(a.material.userData.target-a.material.opacity)*.07;});
  // rotation cinématique quand la scène est idle (avant séance / après verdict)
  if(!playing && !drag && (idx<0 || idx>=events.length-1)) azTarget+=.0006;
  // caméra LISSÉE à chaque frame → plus de mouvements saccadés
  if(Math.abs(azTarget-az)>1e-4){az+=(azTarget-az)*.045; placeCam();}
  if((frame++&3)===0) hover();
  renderer.render(scene,cam);
}
prepare(RUN); requestAnimationFrame(loop);
</script>

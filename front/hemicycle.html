<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Miropolis — Séance simulée</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* Palette groupes validée (dark, CVD 9.8–12 avec encodage secondaire :
     blocs spatiaux contigus + légende + labels au survol). */
  :root{
    --bg:#14161f; --panel:#1c1f2bE6; --ink:#E6E9F0; --ink2:#9aa3b5; --line:#2a2f3f;
  }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:14px/1.45 "Segoe UI",system-ui,sans-serif;overflow:hidden}
  #scene{position:fixed;inset:0}
  .hud{position:fixed;z-index:10}
  #titlebar{top:0;left:0;right:0;padding:14px 20px;background:linear-gradient(#14161fF2,#14161f00);}
  #titlebar h1{margin:0;font-size:17px;font-weight:600;letter-spacing:.2px}
  #titlebar .sub{color:var(--ink2);font-size:12.5px;margin-top:2px}
  #speech{left:50%;transform:translateX(-50%);bottom:86px;width:min(760px,92vw);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;
    backdrop-filter:blur(6px);display:none}
  #speech .who{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
  #speech .chip{display:inline-block;width:10px;height:10px;border-radius:3px}
  #speech .grp{color:var(--ink2);font-size:12px}
  #speech .txt{margin-top:6px;font-size:14.5px;color:#d5dae6}
  #speech.interj{border-color:#8a4a52}
  #speech.interj .txt{font-style:italic}
  #tally{top:64px;right:16px;width:230px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px}
  #tally h2{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2)}
  .trow{margin:7px 0}
  .trow .lab{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2)}
  .trow .lab b{color:var(--ink);font-weight:600}
  .bar{height:7px;border-radius:4px;background:#232736;margin-top:3px;position:relative;overflow:visible}
  .bar .fill{height:100%;border-radius:4px;background:#aeb9d6;transition:width .4s}
  .bar .real{position:absolute;top:-3px;width:2px;height:13px;background:#fff;border-radius:1px}
  #tally .foot{margin-top:10px;font-size:11.5px;color:var(--ink2);border-top:1px solid var(--line);padding-top:8px}
  #verdict{margin-top:8px;font-size:12.5px;display:none}
  #legend{left:16px;bottom:16px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;max-width:210px}
  #legend .g{display:inline-flex;align-items:center;gap:5px;margin:3px 8px 3px 0;font-size:11.5px;color:var(--ink2)}
  #legend .chip{width:9px;height:9px;border-radius:3px;display:inline-block}
  #controls{left:50%;transform:translateX(-50%);bottom:16px;display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:8px 14px}
  #controls button{background:#262b3c;color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:5px 12px;font-size:13px;cursor:pointer}
  #controls button:hover{background:#303650}
  #prog{width:200px;accent-color:#aeb9d6}
  #tip{position:fixed;z-index:20;background:#0f1118F2;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;font-size:12px;pointer-events:none;display:none;max-width:240px}
  #tip .n{font-weight:600}
  #tip .d{color:var(--ink2)}
  #drop{bottom:16px;right:16px;font-size:11.5px;color:var(--ink2)}
  #drop input{display:none}
  #drop label{cursor:pointer;text-decoration:underline dotted}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="hud" id="titlebar"><h1 id="t-titre">Miropolis</h1>
  <div class="sub" id="t-sub">simulation projective de séance — Assemblée nationale</div></div>

<div class="hud" id="drop"><label>charger un autre run (runs/*.json)<input type="file" id="file" accept=".json"></label></div>

<div class="hud" id="tally">
  <h2>Scrutin — tally</h2>
  <div id="rows"></div>
  <div class="foot">barre = prédit (évolue avec le débat) · trait blanc = réel<br>
    <span id="deplace"></span></div>
  <div id="verdict"></div>
</div>

<div class="hud" id="speech">
  <div class="who"><span class="chip" id="s-chip"></span><span id="s-nom"></span>
    <span class="grp" id="s-grp"></span></div>
  <div class="txt" id="s-txt"></div>
</div>

<div class="hud" id="legend"></div>

<div class="hud" id="controls">
  <button id="b-prev">⏮</button>
  <button id="b-play">▶ Lancer la séance</button>
  <button id="b-next">⏭</button>
  <input type="range" id="prog" min="0" max="1" value="0" step="1">
  <button id="b-speed">×1</button>
</div>

<div id="tip"></div>

<script type="application/json" id="run-data">/*__RUN_DATA__*/null</script>

<script type="importmap">{"imports":{"three":"./lib/three.module.min.js"}}</script>
<script type="module">
import * as THREE from 'three';

/* ---------- données ---------- */
const embedded = JSON.parse(document.getElementById('run-data').textContent.replace('/*__RUN_DATA__*/',''));
let RUN = embedded;

const GROUP_ORDER = ["LFI-NFP","GDR","EcoS","SOC","LIOT","Dem","EPR","HOR","DR","UDR","RN","NI"];
const GROUP_COLOR = {
  "LFI-NFP":"#E5446D","GDR":"#C43131","EcoS":"#2FA45C","SOC":"#CC6E8C",
  "LIOT":"#9C79CC","Dem":"#CC7226","EPR":"#C29B1F","HOR":"#2BA3B5",
  "DR":"#4A72DE","UDR":"#B57A33","RN":"#3D5FCC","NI":"#8E9AB3"};

/* ---------- scène ---------- */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14161f);
scene.fog = new THREE.Fog(0x14161f, 60, 140);
const cam = new THREE.PerspectiveCamera(46, 1, .1, 400);

/* orbite simple (drag + molette) */
let az=0, el=.62, dist=46, target=new THREE.Vector3(0,1.2,6);
function placeCam(){
  cam.position.set(target.x+dist*Math.cos(el)*Math.sin(az),
                   target.y+dist*Math.sin(el),
                   target.z+dist*Math.cos(el)*Math.cos(az));
  cam.lookAt(target);
}
let drag=null;
canvas.addEventListener('pointerdown',e=>{drag={x:e.clientX,y:e.clientY};});
addEventListener('pointerup',()=>drag=null);
addEventListener('pointermove',e=>{
  if(drag){az-=(e.clientX-drag.x)*.005; el=Math.min(1.35,Math.max(.15,el+(e.clientY-drag.y)*.004));
    drag={x:e.clientX,y:e.clientY}; placeCam();}
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
});
canvas.addEventListener('wheel',e=>{dist=Math.min(90,Math.max(18,dist+e.deltaY*.02)); placeCam();},{passive:true});

scene.add(new THREE.HemisphereLight(0x8899cc, 0x11131c, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 1.5); key.position.set(-14,26,18); scene.add(key);
const spot = new THREE.SpotLight(0xfff2d0, 0, 60, .32, .5, 1.2); spot.visible=false;
scene.add(spot); scene.add(spot.target);

/* sol + tribune */
const floor = new THREE.Mesh(new THREE.CircleGeometry(42, 72, Math.PI, Math.PI),
  new THREE.MeshStandardMaterial({color:0x1b1e2b, roughness:.9}));
floor.rotation.x = -Math.PI/2; floor.position.z = 6; scene.add(floor);
const dais = new THREE.Mesh(new THREE.BoxGeometry(9,1.6,3.4),
  new THREE.MeshStandardMaterial({color:0x2a2f42, roughness:.7}));
dais.position.set(0,.8,-1.4); scene.add(dais);
const pupitre = new THREE.Mesh(new THREE.BoxGeometry(2.2,1.1,1.2),
  new THREE.MeshStandardMaterial({color:0x39415c, roughness:.6}));
pupitre.position.set(0,1.95,-1.0); scene.add(pupitre);

/* ---------- hémicycle ---------- */
let seats=[], seatMeshes=new THREE.Group(), arcsGroup=new THREE.Group();
scene.add(seatMeshes); scene.add(arcsGroup);
const raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2(-2,-2);

function buildHemicycle(run){
  seatMeshes.clear(); seats=[];
  // députés triés par groupe (ordre politique gauche→droite), puis nom
  const deps=[...run.deputes].sort((a,b)=>
    GROUP_ORDER.indexOf(a.groupe)-GROUP_ORDER.indexOf(b.groupe) || (a.nom<b.nom?-1:1));
  const N=deps.length;
  const ROWS=8, r0=10, dr=2.3;
  const A0=Math.PI-0.18, A1=0.18; // arc gauche→droite face au perchoir
  // 1) générer tous les slots (rangée, angle), capacité ∝ rayon
  const caps=[]; let tot=0;
  for(let r=0;r<ROWS;r++){caps[r]=r0+r*dr; tot+=caps[r];}
  const slots=[];
  let rem=N;
  for(let r=0;r<ROWS;r++){
    const cap=r===ROWS-1?rem:Math.max(1,Math.round(N*caps[r]/tot));
    rem-=cap;
    for(let i=0;i<cap;i++){
      const frac=cap===1?.5:i/(cap-1);
      slots.push({r, ang:A0-(A0-A1)*frac});
    }
  }
  // 2) trier les slots par angle décroissant (gauche→droite), rangée ensuite
  //    → les groupes forment des SECTEURS angulaires, comme le vrai hémicycle
  slots.sort((a,b)=>b.ang-a.ang || a.r-b.r);
  const geo=new THREE.BoxGeometry(.62,.5,.62);
  slots.slice(0,N).forEach((s,k)=>{
    const d=deps[k];
    const radius=r0+s.r*dr, y=.25+s.r*.34;
    const mat=new THREE.MeshStandardMaterial({
      color:new THREE.Color(GROUP_COLOR[d.groupe]||'#666'),
      roughness:.55, emissive:new THREE.Color(GROUP_COLOR[d.groupe]||'#666'),
      emissiveIntensity:.06});
    const m=new THREE.Mesh(geo,mat);
    // perchoir en z≈0, hémicycle devant lui (z positif)
    m.position.set(Math.cos(s.ang)*radius, y, 0.5+Math.sin(s.ang)*radius);
    m.rotation.y=Math.atan2(m.position.x, m.position.z); // face au perchoir
    m.userData=d;
    seats.push(m); seatMeshes.add(m);
  });
}

function groupCentroid(g){
  const ms=seats.filter(s=>s.userData.groupe===g);
  const v=new THREE.Vector3();
  ms.forEach(m=>v.add(m.position)); if(ms.length)v.divideScalar(ms.length);
  return v;
}

/* ---------- arcs d'influence ---------- */
function influenceArcs(fromSeat, run){
  arcsGroup.clear();
  const aff=run.affinites?.[fromSeat.userData.groupe]||{};
  for(const g of GROUP_ORDER){
    if(g===fromSeat.userData.groupe || !(g in aff)) continue;
    const w=aff[g]; if(Math.abs(w)<0.05) continue;
    const to=groupCentroid(g); if(to.lengthSq()===0) continue;
    const mid=fromSeat.position.clone().add(to).multiplyScalar(.5); mid.y+=5+6*Math.abs(w);
    const curve=new THREE.QuadraticBezierCurve3(fromSeat.position.clone().setY(fromSeat.position.y+.6), mid, to.clone().setY(to.y+.6));
    const geo=new THREE.TubeGeometry(curve, 24, .05+.10*Math.abs(w), 6, false);
    const mat=new THREE.MeshBasicMaterial({
      color:w>0?0x57d18b:0xe06a6a, transparent:true, opacity:.12+.55*Math.abs(w)});
    arcsGroup.add(new THREE.Mesh(geo,mat));
  }
}

/* ---------- HUD ---------- */
const $=id=>document.getElementById(id);
function legend(run){
  const present=new Set(run.deputes.map(d=>d.groupe));
  $('legend').innerHTML=GROUP_ORDER.filter(g=>present.has(g)).map(g=>
    `<span class="g"><span class="chip" style="background:${GROUP_COLOR[g]}"></span>${g}</span>`).join('');
}
function tallyRows(run, current){
  const max=Math.max(run.reel.pour+run.reel.contre+run.reel.abstention, 1);
  $('rows').innerHTML=['pour','contre','abstention'].map(p=>{
    const v=current[p]??run.tally_avant_debat[p], r=run.reel[p];
    return `<div class="trow"><div class="lab"><span>${p}</span><b>${v.toFixed(0)} <span style="color:var(--ink2)">/ ${r} réel</span></b></div>
      <div class="bar"><div class="fill" style="width:${100*v/max}%"></div>
      <div class="real" style="left:${100*r/max}%"></div></div></div>`;}).join('');
}

/* ---------- replay ---------- */
let events=[], idx=-1, playing=false, speed=1, interpol={};
function prepare(run){
  events=run.transcript;
  $('prog').max=Math.max(events.length-1,1);
  $('t-titre').textContent='Scrutin '+(run.scrutin?.uid||'')+' — '+(run.scrutin?.titre||'').slice(0,110);
  $('t-sub').textContent=`thème ${run.scrutin?.theme||'?'} · ${run.deputes.length} députés · ${events.length} prises de parole · sort réel : ${run.scrutin?.sort||'?'}`;
  $('deplace').textContent=`voix déplacées par la séance : ${run.voix_deplacees_par_le_debat??'—'}`;
  legend(run); tallyRows(run, run.tally_avant_debat);
  buildHemicycle(run); placeCam();
}
function opinionAt(frac){ // interpolation opinion0→opinion pour le tally vivant
  const t={pour:0,contre:0,abstention:0};
  RUN.deputes.forEach(d=>{for(const p in t){t[p]+=d.opinion0[p]+(d.opinion[p]-d.opinion0[p])*frac;}});
  return t;
}
let lastSeat=null;
function showEvent(i){
  idx=i; $('prog').value=i;
  const ev=events[i]; if(!ev) return;
  const seat=seats.find(s=>s.userData.nom===ev.nom)||seats.find(s=>s.userData.groupe===ev.groupe);
  if(lastSeat){lastSeat.scale.set(1,1,1); lastSeat.material.emissiveIntensity=.06;}
  if(seat){
    seat.scale.set(1.6,2.2,1.6); seat.material.emissiveIntensity=.9;
    spot.visible=true; spot.position.set(seat.position.x,16,seat.position.z+4);
    spot.target.position.copy(seat.position); spot.intensity=350;
    influenceArcs(seat, RUN);
    // caméra penche légèrement vers l'orateur (bornée : l'hémicycle reste cadré)
    const lean=Math.max(-.38,Math.min(.38,Math.atan2(seat.position.x,24)));
    az+=(lean-az)*.35; placeCam();
    lastSeat=seat;
  }
  const sp=$('speech'); sp.style.display='block';
  sp.className=ev.interjection?'hud interj':'hud';
  $('s-chip').style.background=GROUP_COLOR[ev.groupe]||'#666';
  $('s-nom').textContent=(ev.interjection?'💥 ':'')+ev.nom;
  $('s-grp').textContent=ev.groupe+(ev.interjection?' — interjection':'');
  $('s-txt').textContent=ev.texte;
  tallyRows(RUN, opinionAt((i+1)/events.length));
  if(i>=events.length-1) finish();
}
function finish(){
  playing=false; $('b-play').textContent='↺ Rejouer';
  tallyRows(RUN, RUN.tally);
  const v=$('verdict'); v.style.display='block';
  const pred=RUN.tally.pour>RUN.tally.contre?'adopté':'rejeté';
  const ok=(pred==='adopté')===((RUN.scrutin?.sort||'').includes('adopt'));
  v.innerHTML=`Sort prédit : <b>${pred}</b> · réel : <b>${RUN.scrutin?.sort}</b> ${ok?'✅':'❌'}`;
}
function tick(){
  if(playing){
    if(idx<events.length-1) showEvent(idx+1); else playing=false;
    const ev=events[idx];
    const delay=(ev?.interjection?1600:4200)/speed;
    if(playing) setTimeout(tick, delay);
  }
}
$('b-play').onclick=()=>{
  if(idx>=events.length-1){idx=-1;$('verdict').style.display='none';}
  playing=!playing; $('b-play').textContent=playing?'⏸ Pause':'▶ Lancer la séance';
  if(playing) tick();
};
$('b-next').onclick=()=>{playing=false;showEvent(Math.min(idx+1,events.length-1));};
$('b-prev').onclick=()=>{playing=false;showEvent(Math.max(idx-1,0));};
$('prog').oninput=e=>{playing=false;showEvent(+e.target.value);};
$('b-speed').onclick=e=>{speed=speed>=4?1:speed*2;e.target.textContent='×'+speed;};
$('file').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=()=>{RUN=JSON.parse(r.result); idx=-1; prepare(RUN);};
  r.readAsText(f);
};

/* tooltip 3D */
const tip=$('tip');
function hover(){
  raycaster.setFromCamera(mouse,cam);
  const hit=raycaster.intersectObjects(seats)[0];
  if(hit){
    const d=hit.object.userData;
    tip.style.display='block';
    tip.style.left=(innerWidth*(mouse.x+1)/2+14)+'px';
    tip.style.top=(innerHeight*(1-(mouse.y+1)/2)+10)+'px';
    tip.innerHTML=`<div class="n">${d.nom}</div><div class="d">${d.groupe} · loyauté ${(d.loyaute*100).toFixed(0)}%<br>
      P(pour) ${(d.opinion0.pour*100).toFixed(0)}% → ${(d.opinion.pour*100).toFixed(0)}%</div>`;
  } else tip.style.display='none';
}

/* boucle */
function resize(){renderer.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();}
addEventListener('resize',resize); resize();
function loop(t){
  requestAnimationFrame(loop);
  if(lastSeat){lastSeat.material.emissiveIntensity=.55+.35*Math.sin(t*.006);}
  arcsGroup.children.forEach((a,i)=>{a.material.opacity=Math.max(.08,a.material.opacity*.997);});
  hover(); renderer.render(scene,cam);
}
prepare(RUN); requestAnimationFrame(loop);
</script>
</body>
</html>
